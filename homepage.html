<!DOCTYPE html>

  <title>Netflix home</title>

<body>
  <header class="header">
    <div class="header-left">
      <img src="Netflix_Logo.jpg" alt="Netflix" />

        <a href="#">Home</a>
        <a href="#">Series</a>
